<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Huang Group at the School of Chemistry, Nanjing University develops new-to-nature biocatalytic systems at the interface of enzyme engineering, visible-light catalysis, electrochemistry, and synthetic chemistry.">
  <title>Experience | The Huang Group</title>
  <style>
    :root {
      --ink: #182126;
      --muted: #5c6870;
      --soft: #f4f7f6;
      --paper: #ffffff;
      --line: #dfe7e5;
      --violet: #6f005d;
      --green: #6f005d;
      --blue: #2d6f8f;
      --gold: #c8a45d;
      --charcoal: #555555;
      --charcoal-dark: #2f2f2f;
      --dark: #06101a;
      --dark-2: #0a1621;
      --dark-3: #101d28;
      --dark-card: rgba(255, 255, 255, 0.065);
      --dark-card-strong: rgba(255, 255, 255, 0.1);
      --dark-line: rgba(214, 232, 236, 0.18);
      --dark-text: #eef6f6;
      --dark-muted: #b5c6cb;
      --cyan: #8ee7f0;
      --shadow: 0 18px 45px rgba(24, 33, 38, 0.08);
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--dark-text);
      background: var(--dark);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
      text-rendering: optimizeLegibility;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: var(--cyan);
      text-decoration-thickness: 1px;
      text-underline-offset: 0.18em;
    }

    a:hover {
      color: var(--violet);
    }

    .skip-link {
      position: absolute;
      left: -999px;
      top: 0;
      z-index: 10;
      padding: 0.75rem 1rem;
      background: var(--ink);
      color: #fff;
    }

    .skip-link:focus {
      left: 1rem;
      top: 1rem;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #555555;
      border-bottom: 1px solid rgba(0, 0, 0, 0.3);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.16);
    }

    .nav-shell {
      width: calc(100% - 40px);
      max-width: var(--max);
      margin: 0 auto;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.95rem;
      color: #fff;
      text-decoration: none;
      font-family: "Trebuchet MS", ui-sans-serif, system-ui, sans-serif;
      font-size: 1.45rem;
      font-style: italic;
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
    }

    .brand-symbol {
      display: none;
    }

    .brand small {
      display: none;
      margin-top: 0.1rem;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .main-nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.25rem;
      flex-wrap: wrap;
    }

    .main-nav a {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0.42rem 0.78rem;
      border-radius: 999px;
      color: #f7f7f7;
      font-size: 0.93rem;
      font-weight: 650;
      text-decoration: none;
    }

    .main-nav a:hover,
    .main-nav a.is-active {
      background: rgba(255, 255, 255, 0.16);
      color: #ffffff;
    }

    main {
      min-height: 60vh;
    }

    .wrap {
      width: calc(100% - 40px);
      max-width: var(--max);
      margin: 0 auto;
    }

    .band {
      padding: 4.5rem 0;
    }

    .band.compact {
      padding: 2.7rem 0 0.8rem;
    }

    .band.tint {
      background: var(--soft);
      border-block: 1px solid var(--line);
    }

    .band.tight {
      padding: 3rem 0;
    }

    .section-kicker {
      margin: 0 0 0.55rem;
      color: var(--green);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .section-title {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.7rem, 3vw, 2.65rem);
      line-height: 1.12;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .section-lede {
      max-width: 780px;
      margin: 1rem 0 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      margin-top: 1.6rem;
    }

    .hero-copy .button-row {
      justify-content: center;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      min-height: 44px;
      padding: 0.72rem 1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      background: #fff;
      font-weight: 750;
      text-decoration: none;
      box-shadow: 0 8px 22px rgba(24, 33, 38, 0.05);
    }

    .button.primary {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .button:hover {
      transform: translateY(-1px);
      color: var(--ink);
      border-color: rgba(111, 0, 93, 0.35);
    }

    .button.primary:hover {
      color: #fff;
      background: #560049;
    }

    .hero-band {
      padding: 4.2rem 0 4rem;
      position: relative;
      min-height: calc(100vh - 68px);
      display: flex;
      align-items: center;
      overflow: hidden;
      background: #111618;
      border-bottom: 0;
    }

    .hero-band::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("/research/media/home-protein-bg.png") center / cover no-repeat;
      filter: saturate(1.08) contrast(1.04);
      opacity: 0.86;
      z-index: 0;
    }

    .hero-band::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 44%, rgba(3, 11, 23, 0.1), rgba(3, 8, 16, 0.68) 72%),
        linear-gradient(rgba(2, 8, 18, 0.2), rgba(2, 8, 18, 0.74));
      z-index: 1;
    }

    .hero-energy {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: hidden;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .light-orb,
    .bolt,
    .spark {
      position: absolute;
      display: block;
    }

    .light-orb {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      filter: blur(12px);
      opacity: 0.58;
      animation: energyPulse 6.5s ease-in-out infinite;
    }

    .light-orb.primary {
      top: 15%;
      left: 45%;
      background: radial-gradient(circle, rgba(162, 255, 248, 0.88) 0, rgba(64, 223, 255, 0.32) 36%, transparent 70%);
    }

    .light-orb.secondary {
      right: 30%;
      bottom: 30%;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(255, 224, 128, 0.74) 0, rgba(255, 160, 73, 0.28) 36%, transparent 72%);
      animation-delay: -2.2s;
    }

    .bolt {
      width: 92px;
      height: 176px;
      opacity: 0.48;
      background: linear-gradient(180deg, rgba(219, 252, 255, 0.98), rgba(118, 210, 255, 0.86) 46%, rgba(255, 214, 100, 0.84));
      clip-path: polygon(44% 0, 68% 0, 55% 36%, 75% 36%, 30% 100%, 43% 54%, 26% 54%);
      filter: drop-shadow(0 0 12px rgba(111, 225, 255, 0.9)) drop-shadow(0 0 24px rgba(255, 196, 87, 0.55));
      transform-origin: center;
      animation: boltGlow 4.8s ease-in-out infinite;
    }

    .bolt-one {
      top: 16%;
      right: 27%;
      transform: rotate(18deg);
    }

    .bolt-two {
      left: 25%;
      bottom: 17%;
      width: 58px;
      height: 112px;
      opacity: 0.42;
      transform: rotate(-22deg);
      animation-delay: -1.7s;
    }

    .spark {
      width: 130px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(133, 246, 255, 0.95), rgba(255, 223, 120, 0.78), transparent);
      filter: drop-shadow(0 0 12px rgba(125, 238, 255, 0.82));
      opacity: 0.72;
    }

    .spark-one {
      top: 30%;
      left: 35%;
      transform: rotate(-16deg);
    }

    .spark-two {
      right: 28%;
      bottom: 31%;
      width: 160px;
      transform: rotate(23deg);
    }

    @keyframes energyPulse {
      0%,
      100% {
        opacity: 0.54;
        transform: scale(0.94);
      }

      50% {
        opacity: 0.84;
        transform: scale(1.08);
      }
    }

    @keyframes boltGlow {
      0%,
      100% {
        opacity: 0.45;
      }

      14% {
        opacity: 0.78;
      }

      20% {
        opacity: 0.54;
      }

      56% {
        opacity: 0.72;
      }
    }

    .hero-grid {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 3;
    }

    .eyebrow {
      margin: 0 0 1rem;
      color: rgba(255, 255, 255, 0.88);
      font-size: 0.82rem;
      font-weight: 820;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .hero-copy h1 {
      margin: 0;
      max-width: 1320px;
      font-size: clamp(1.85rem, 2.45vw, 2.75rem);
      line-height: 1.12;
      letter-spacing: 0;
      white-space: nowrap;
      overflow-wrap: anywhere;
      color: #fff;
      text-shadow: 0 4px 22px rgba(0, 0, 0, 0.62);
    }

    .hero-lede {
      max-width: 980px;
      margin: 1.4rem 0 0;
      color: rgba(255, 255, 255, 0.92);
      font-size: clamp(1.05rem, 1.55vw, 1.28rem);
      line-height: 1.45;
      overflow-wrap: anywhere;
      margin-left: auto;
      margin-right: auto;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.65);
    }

    .hero-lede span {
      display: block;
    }

    .signal-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.85rem;
      margin: 2rem auto 0;
      max-width: 760px;
    }

    .signal-row div {
      min-height: 92px;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
    }

    .signal-row dt {
      margin: 0;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 760;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .signal-row dd {
      margin: 0.35rem 0 0;
      color: var(--ink);
      font-size: 1.08rem;
      font-weight: 760;
      line-height: 1.25;
    }

    .hero-figure {
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #101214;
      box-shadow: var(--shadow);
    }

    .hero-figure img {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
    }

    .hero-figure figcaption {
      padding: 0.85rem 1rem;
      color: #dbe4e1;
      font-size: 0.88rem;
      background: #171b1f;
    }

    .research-spotlight {
      padding: 4.2rem 0 3.7rem;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(248, 250, 249, 0.96), rgba(255, 255, 255, 0.92) 48%, rgba(247, 241, 246, 0.9)),
        #fff;
    }

    .research-spotlight-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.86fr) minmax(360px, 0.72fr);
      gap: 2.6rem;
      align-items: center;
    }

    .research-spotlight-copy h1 {
      max-width: 850px;
      margin: 0;
      color: var(--ink);
      font-size: clamp(2.25rem, 5vw, 4.5rem);
      line-height: 1.02;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .research-axis {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin-top: 1.5rem;
    }

    .research-axis span {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0.36rem 0.72rem;
      border: 1px solid rgba(111, 0, 93, 0.18);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      font-size: 0.88rem;
      font-weight: 800;
      box-shadow: 0 8px 22px rgba(24, 33, 38, 0.05);
    }

    .research-axis span:nth-child(2) {
      border-color: rgba(200, 164, 93, 0.35);
      color: #725a22;
    }

    .research-axis span:nth-child(3) {
      border-color: rgba(45, 111, 143, 0.28);
      color: #245b74;
    }

    .research-spotlight-figure {
      margin: 0;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .research-spotlight-figure img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: contain;
      border-radius: 5px;
      background: #fff;
    }

    .research-spotlight-figure figcaption {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .signature-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.9rem;
    }

    .signature-item {
      min-height: 168px;
      padding: 1.25rem 1.3rem;
      border: 1px solid var(--line);
      border-top: 4px solid var(--gold);
      border-radius: 8px;
      background: #fff;
    }

    .signature-item:nth-child(2) {
      border-top-color: var(--violet);
    }

    .signature-item:nth-child(3) {
      border-top-color: var(--blue);
    }

    .signature-mark {
      display: inline-flex;
      margin-bottom: 1.1rem;
      color: var(--gold);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .signature-item:nth-child(2) .signature-mark {
      color: var(--violet);
    }

    .signature-item:nth-child(3) .signature-mark {
      color: var(--blue);
    }

    .signature-item h2 {
      margin: 0;
      font-size: 1.16rem;
      line-height: 1.25;
    }

    .signature-item p {
      margin: 0.65rem 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .focus-grid,
    .research-grid,
    .member-grid,
    .platform-grid {
      display: grid;
      gap: 1rem;
    }

    .focus-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .focus-item,
    .research-card,
    .member-card,
    .publication,
    .platform-item,
    .news-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
    }

    .focus-item {
      padding: 1.4rem;
    }

    .focus-mark {
      display: inline-flex;
      width: 42px;
      height: 42px;
      margin-bottom: 1rem;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: #fff;
      background: var(--green);
      font-weight: 850;
    }

    .focus-item:nth-child(2) .focus-mark {
      background: var(--violet);
    }

    .focus-item:nth-child(3) .focus-mark {
      background: var(--gold);
    }

    .focus-item h3,
    .research-card h3,
    .platform-item h3 {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.3;
    }

    .focus-item p,
    .research-card p,
    .platform-item p {
      margin: 0.65rem 0 0;
      color: var(--muted);
    }

    .home-research {
      position: relative;
      overflow: hidden;
      padding-top: 4.7rem;
      padding-bottom: 4.4rem;
      background:
        radial-gradient(circle at 76% 32%, rgba(142, 231, 240, 0.1), transparent 34%),
        linear-gradient(180deg, #06101a, #08131d);
    }

    .home-research::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("/research/media/home-protein-bg.png") center / 70% auto no-repeat;
      opacity: 0.1;
      filter: saturate(0.85);
      pointer-events: none;
    }

    .home-research-simple {
      position: relative;
      z-index: 1;
      max-width: 900px;
      text-align: center;
    }

    .home-research-simple .section-title {
      color: var(--dark-text);
      font-size: 4rem;
      line-height: 1;
      text-transform: uppercase;
    }

    .research-divider {
      width: 96px;
      height: 1px;
      margin: 1.4rem auto 1.7rem;
      background: linear-gradient(90deg, transparent, rgba(200, 164, 93, 0.95), transparent);
    }

    .research-divider::after {
      content: "";
      display: block;
      width: 3px;
      height: 26px;
      margin: -12px auto 0;
      background: var(--gold);
      border-radius: 999px;
    }

    .home-research-simple .section-lede {
      max-width: 780px;
      margin-right: auto;
      margin-left: auto;
      color: var(--dark-text);
      font-size: 1.25rem;
      line-height: 1.72;
    }

    .home-research-simple .section-lede.secondary {
      margin-top: 0.2rem;
      color: var(--dark-muted);
      font-size: 1.08rem;
    }

    .research-mini-flow {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.65rem;
      margin-top: 1.8rem;
    }

    .research-mini-flow span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0.38rem 0.78rem;
      border: 1px solid rgba(214, 232, 236, 0.2);
      border-radius: 999px;
      color: var(--dark-text);
      background: rgba(255, 255, 255, 0.065);
      font-weight: 780;
    }

    .research-mini-flow i,
    .research-mini-flow b {
      color: var(--gold);
      font-style: normal;
      font-weight: 850;
    }

    .home-research-simple .button {
      margin-top: 1.8rem;
      color: var(--dark-text);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(214, 232, 236, 0.26);
      box-shadow: none;
    }

    .home-research-simple .button:hover {
      color: #fff;
      border-color: rgba(142, 231, 240, 0.6);
      background: rgba(142, 231, 240, 0.12);
    }

    .home-research-layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 0.78fr);
      gap: 3rem;
      align-items: center;
    }

    .home-research-copy {
      max-width: 720px;
    }

    .home-research-copy .section-title {
      max-width: 820px;
      font-size: 3.1rem;
      line-height: 1.08;
    }

    .home-research-copy .section-lede {
      max-width: 650px;
      font-size: 1.2rem;
      line-height: 1.65;
    }

    .home-research-copy .button {
      margin-top: 1.6rem;
      color: var(--dark-text);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(214, 232, 236, 0.26);
      box-shadow: none;
    }

    .home-research-copy .button:hover {
      color: #fff;
      border-color: rgba(142, 231, 240, 0.6);
      background: rgba(142, 231, 240, 0.12);
    }

    .home-research-visual {
      position: relative;
      min-height: 330px;
      padding: 1.4rem;
      border: 1px solid rgba(214, 232, 236, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
    }

    .flow-node,
    .flow-product {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      text-align: center;
      font-weight: 850;
      line-height: 1.15;
    }

    .enzyme-node {
      left: 1.6rem;
      top: 50%;
      width: 142px;
      height: 142px;
      color: #06101a;
      background:
        radial-gradient(circle at 36% 32%, rgba(255, 255, 255, 0.92), transparent 28%),
        linear-gradient(145deg, #8ee7f0, #c8a45d);
      transform: translateY(-50%);
      box-shadow: 0 0 0 12px rgba(142, 231, 240, 0.08);
    }

    .flow-inputs {
      position: absolute;
      top: 1.4rem;
      left: 12.4rem;
      right: 1.4rem;
      display: grid;
      gap: 0.8rem;
    }

    .flow-inputs span {
      width: fit-content;
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      padding: 0.42rem 0.75rem;
      border: 1px solid rgba(214, 232, 236, 0.2);
      border-radius: 999px;
      color: var(--dark-text);
      background: rgba(255, 255, 255, 0.07);
      font-weight: 780;
    }

    .flow-inputs span:nth-child(2) {
      margin-left: 2.2rem;
      color: #ffe4a6;
    }

    .flow-inputs span:nth-child(3) {
      margin-left: 0.7rem;
      color: #bff7fc;
    }

    .flow-arrow {
      position: absolute;
      left: 12rem;
      right: 8.8rem;
      top: 50%;
      height: 2px;

      border-bottom: 1px solid var(--dark-line);
      color: var(--dark-text);

      opacity: 0.28;

    .page-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:

      position: absolute;

      background: url("/research/media/home-protein-bg.png") center / cover no-repeat;

      filter: saturate(0.95);

      position: absolute;
      inset: 0;
